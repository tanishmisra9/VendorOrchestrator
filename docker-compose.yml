services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vendor_master_db}
      MYSQL_USER: ${MYSQL_USER:-vendor_admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-vendor_admin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vendor_master_db}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-false}
      APP_PASSWORD: ${APP_PASSWORD:-}
      STRICT_AUDIT: ${STRICT_AUDIT:-true}
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["sh", "-c", "alembic upgrade head && streamlit run ui/app.py --server.port=${PORT:-8501} --server.address=0.0.0.0"]
    volumes:
      - ./data:/app/data

volumes:
  mysql_data:
